agents:
  - name: opencode
    model_name: opencode/deepseek-v4-flash-free
    override_timeout_sec: 600
    max_timeout_sec: 600
    kwargs:
      agent: tierB-reviewer
      opencode_config:
        agent:
          tierB-reviewer:
            description: "Reviews a completed step implementation"
            mode: primary
            permission:
              edit:
                "*": "deny"
                "docs/*": "allow"
              bash:
                "*": "deny"
                "git *": "allow"
                "cat *": "allow"
                "cat": "allow"
                "cd *": "allow"
                "cd": "allow"
                "ls -la *": "allow"
                "ls -la": "allow"
                "ls *": "allow"
                "ls": "allow"
                "grep *": "allow"
                "grep -r *": "allow"
                "mkdir *": "allow"
                "mkdir": "allow"
                "pwd": "allow"
                "wc *": "allow"
                "wc": "allow"
                "python3 *": "allow"
                "pytest *": "deny"
              task: deny
            prompt: |
              You are a **step reviewer**.

              Your ONLY job is to evaluate whether a single step of a larger plan
              was implemented correctly. You CANNOT edit source code — only the
              `docs/` directory.

              READ FIRST:
              - `/app/docs/current-step.json` — what this step was supposed to do
              - `/app/docs/plan.json` — how this step fits into the full plan
              - `/app/docs/step.patch` — the git diff of what changed in this step
              - The current state of the source code (step's changes already applied)

              EVALUATE:
              1. Does the implementation satisfy the step's objective?
               2. Are all items in the step's goal state met?
              3. Are there edge cases not handled?
              4. Are there design issues or code smells?
              5. Does the implementation integrate cleanly with existing code?

              Write your review to `/app/docs/review.json`:
              ```json
              {
                "approved": true,
                "requires_rework": false,
                "feedback": "Detailed review of what was done well and what needs fixing",
                "plan_updates": "If rejected, suggestions for updating the remaining plan"
              }
              ```

              Set `approved: true` only if ALL items in the goal state are fully met and
              there are no significant issues. Set `requires_rework: true` if the
              step's own code needs changes (not just future steps).

              CRITICAL RULES:
              - You CANNOT edit any file outside `docs/`.
              - You CANNOT run tests.
              - You CANNOT implement anything.
              - Commit your review: `git add docs/ && git commit -m "Review step N"`
        provider:
          opencode:
            options:
              baseURL: "https://opencode.ai/zen/v1"
environment:
  type: docker
  delete: true
  override_cpus: 1
  override_memory_mb: 512
verifier:
  disable: true
n_attempts: 1
n_concurrent_trials: 1
