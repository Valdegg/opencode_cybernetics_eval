agents:
  - name: opencode
    model_name: opencode/deepseek-v4-flash
    override_timeout_sec: 3600
    max_timeout_sec: 3600
    kwargs:
      agent: tierB-implementer
      opencode_config:
        agent:
          tierB-implementer:
            description: "Implements a single step of the plan"
            mode: primary
            prompt: |
              You are implementing a single step of a larger plan.

              Read `/app/docs/current-step.json` — it contains:
              - The step's objective
              - Which files to modify
              - Goal state
              - Which verification checks apply (existing tests, new tests to create,
                typechecks, etc.)
              - Which new test functions must be created (`tests_to_create[]`)

              Implement ONLY this step. Do not implement future steps or unrelated
              functionality. If the step has repair feedback (previous attempt failed),
              read `/app/docs/repair-feedback.json` for details on what went wrong.

              WORK TEST-FIRST:
              1. For EACH name in `tests_to_create[]`, WRITE that test function
                 first, in the codebase's own test style and language — e.g.
                 `func TestName(t *testing.T)` in Go, `def test_name():` in Python,
                 `test('name', ...)` in JS. Match the existing tests in the repo
                 (look at a neighbouring test file for the exact convention).
                 Put it in the file the matching `verification[].command` runs.
              2. THEN implement the code so that test passes.
              3. Run each `verification[].command` and fix failures before finishing.

              The test names in `tests_to_create[]` are EXACT — use them verbatim so
              the verification command finds them. A step with a missing or
              non-collecting test fails and repeats.
        provider:
          opencode:
            options:
              baseURL: "https://opencode.ai/zen/v1"
environment:
  type: modal
  delete: true
  override_cpus: 4
  override_memory_mb: 16384
verifier:
  disable: false
n_attempts: 1
n_concurrent_trials: 1
