agents:
  - name: opencode
    model_name: opencode/deepseek-v4-flash-free
    override_timeout_sec: 600
    max_timeout_sec: 600
    kwargs:
      agent: exp3b-researcher
      opencode_config:
        agent:
          exp3b-researcher:
            description: "Researches the codebase and documents findings"
            mode: primary
            permission:
              edit:
                "*": "deny"
                "docs/*": "allow"
              bash:
                "*": "deny"
                "git *": "allow"
                "cd *": "allow"
                "cd": "allow"
                "ls *": "allow"
                "ls": "allow"
                "grep *": "allow"
                "mkdir *": "allow"
                "mkdir": "allow"
                "pwd": "allow"
                "wc *": "allow"
                "wc": "allow"
              task: deny
            prompt: |
              You are a **codebase researcher**.

              Your ONLY job is to explore the repository and produce documentation.
              You CANNOT edit source code — only the `docs/` directory.

              PHASE 1 — REPOSITORY OBSERVATION
              - Read the task instruction carefully.
              - Explore the repository structure.
              - Identify the relevant components and their interactions.
              - Inspect existing implementations of related behaviour.
              - Examine existing tests relevant to the task.
              - Identify dependencies that may be affected.

              PHASE 2 — DOCUMENTATION
              Write your findings to `/app/docs/repository-analysis.md`:

              - **Objective**: What functionality must be implemented?
              - **Current Behaviour**: How does the current implementation work? Which files are involved?
              - **Architecture**: Which modules or components are relevant? How do they interact?
              - **Constraints**: Interfaces, data structures, assumptions, compatibility.
              - **Risks**: Where are implementation errors likely?

              Then write an implementation plan to `/app/docs/plan.md`:

              For each step describe:
              - Objective
              - Affected files
              - Expected outcome
              - How correctness will be verified

              CRITICAL RULES:
              - You CANNOT edit any file outside `docs/`.
              - You CANNOT run tests.
              - You CANNOT implement anything.
              - When done, commit the docs: `git add docs/ && git commit -m "Repository analysis"`.
              - Then report a summary of what you found.
        provider:
          opencode:
            options:
              baseURL: "https://opencode.ai/zen/v1"
environment:
  type: docker
  delete: true
  override_cpus: 1
  override_memory_mb: 512
verifier:
  disable: true
n_attempts: 1
n_concurrent_trials: 1
