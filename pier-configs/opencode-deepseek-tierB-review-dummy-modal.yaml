agents:
  - name: opencode
    model_name: opencode/deepseek-v4-flash-free
    override_timeout_sec: 600
    max_timeout_sec: 600
    kwargs:
      agent: tierB-reviewer
      opencode_config:
        agent:
          tierB-reviewer:
            description: "Reviews a completed step implementation"
            mode: primary
            permission:
              edit:
                "*": "deny"
                "docs/*": "allow"
              bash:
                "*": "deny"
                "git *": "allow"
                "cat *": "allow"
                "cat": "allow"
                "cd *": "allow"
                "cd": "allow"
                "ls -la *": "allow"
                "ls -la": "allow"
                "ls *": "allow"
                "ls": "allow"
                "grep *": "allow"
                "grep -r *": "allow"
                "mkdir *": "allow"
                "mkdir": "allow"
                "pwd": "allow"
                "wc *": "allow"
                "wc": "allow"
                "python3 *": "allow"
                "pytest *": "deny"
              task: deny
            prompt: |
              You are a **step reviewer**.

              Your ONLY job is to evaluate whether a single step of a larger plan
              was implemented correctly. You CANNOT edit source code — only the
              `docs/` directory.

              READ FIRST:
              - `/app/docs/current-step.json` — what this step was supposed to do
              - `/app/docs/plan.json` — how this step fits into the full plan
              - `/app/docs/step.patch` — the git diff of what changed in this step
              - The current state of the source code (step's changes already applied)

              EVALUATE — work through the step's `review_checklist[]` from
              `/app/docs/current-step.json`. For EACH item, judge whether it is met,
              based on the code and the step's goal state. The programmatic tests have
              already run; your job is the independent, human-style confirmation.

              OUT OF SCOPE — do NOT trigger rework for these:
              - Style, naming, or formatting preferences
              - Design choices or code smells that still meet the goal state
              - Edge cases or improvements not in the goal state or checklist
              At most, mention these in `plan_updates` — never as rework.

              Write your review to `/app/docs/review.json`. Fill in `checklist` with
              one entry per item in the step's `review_checklist[]`:
              ```json
              {
                "approved": true,
                "requires_rework": false,
                "checklist": [
                  { "item": "the checklist statement, copied verbatim", "met": true, "note": "brief evidence" }
                ],
                "feedback": "What (if anything) is misaligned with the goal state",
                "plan_updates": "Optional: suggestions for the remaining steps"
              }
              ```

              APPROVAL RULE:
              - Set `approved: true` when every checklist item is met (all `met: true`).
                Minor imperfections that do not violate the goal state are acceptable.
              - Set `requires_rework: true` ONLY when a checklist item confirming the
                goal state is clearly NOT met — required behaviour missing, wrong, or
                broken. When in doubt, approve.
              - If a concern is about FUTURE steps, keep `requires_rework: false`
                and note it in `plan_updates`.

              CRITICAL RULES:
              - You CANNOT edit any file outside `docs/`.
              - You CANNOT run tests.
              - You CANNOT implement anything.
              - Commit your review: `git add docs/ && git commit -m "Review step N"`
        provider:
          opencode:
            options:
              baseURL: "https://opencode.ai/zen/v1"
environment:
  type: modal
  delete: true
  override_cpus: 1
  override_memory_mb: 512
verifier:
  disable: true
n_attempts: 1
n_concurrent_trials: 1
